    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="fav.ico">
</head>
<body class="main">

<!-- Write down here -->
<div>
    <!-- First contents -->
    <div class="first" id="first">

            <div class="main-icon">
                <div class="c fadeUp1" id="circleContainer">

                            <a href="#second" class="text-normal fadeUp3 next-button1"><i class="material-icons">keyboard_arrow_down</i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="second" id="second">
        <div class="container">
            <div style="margin-top: 0; padding-top: 10vh" class="text-big">

                <h2 class="h text-big"><b>My Profile</b></h2>
            </div>
            <div class="container left" style="padding-top: 7vh; width: 100%">
                <div class="container">

                    <p class="text-normal"><b>名前: 糸山 智基</b></p>

    <div id="third" class="third">

            <div style="margin-top: 0; padding-top: 10vh" class="text-big">

                <h2 class="h text-big"><b>Contact</b></h2>
            </div>
            <div class="container left" style="padding-top: 7vh; width: 100%">
                <div class="container">
                    <p class="text-normal">Instagram: <b>@temokii</b></p>
                    <p class="text-normal">Address: <b>tomoki.itoyama.dev@gmail.com</b></p>

                </div>
            </div>
        </div>
    </div>
    <script>
        const scorrllLinks = document.querySelectorAll('a[href^="#"]');
        scorrllLinks.forEach((scorrllLink) => {
            scorrllLink.addEventListener("click", (e) => {
                e.preventDefault();
                const hrefLink = scorrllLink.getAttribute("href");
                const targetContent = document.getElementById(hrefLink.replace("#", ""));
                const rectTop = targetContent.getBoundingClientRect().top;
                const positionY = window.pageYOffset;
                const target = rectTop + positionY;
                window.scrollTo({
                    top: target,
                    behavior: "smooth",
                });
            });
        });

    </script>
